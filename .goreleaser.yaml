# GoReleaser configuration for Zevaro.
# Produces signed cross-platform binaries. Code signing is added in ZV-050/051/052.
# Invoked locally by the maintainer via `make release` (implemented in ZV-057).
version: 2

project_name: zevaro

builds:
  - id: zevaro
    main: ./cmd/zevaro
    binary: zevaro
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude 32-bit Windows and Linux/arm64 cross-compilation issues addressed per-platform.
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: zevaro
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: zevaro
    name: zevaro
  draft: true
  prerelease: auto
