                - display_name
              properties:
                provider_id:
                  type: string
                  enum:
                    - anthropic
                    - openai
                    - xai
                    - google
                    - deepseek
                    - mistral
                    - groq
                    - together
                    - cohere
                    - ollama
                    - lmstudio
                    - llamacpp
                    - vllm
                    - bigpickle
                  description: "The canonical provider type identifier."
                display_name:
                  type: string
                  description: "User-assigned display name."
                base_url:
                  type: ["string", "null"]
                  description: "Override base URL. Required for local providers."
                enabled:
                  type: boolean
                  description: "Whether to enable this provider immediately. Defaults to true."
      responses:
        '201':
          description: "Provider registered successfully."
          content:
            application/json:
