    post:
      operationId: createProvider
      summary: Register a new provider
      description: >
        Registers a new provider instance. The API key (if required) must be
        submitted separately via a secure key-storage endpoint and is never
        accepted in this request body.
      tags:
        - Management
      security:
        - LocalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "New provider registration request."
              required:
