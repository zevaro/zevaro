  # ── Audit ──────────────────────────────────────────────────────────────────────

  /api/v1/audit/export:
    post:
      operationId: exportAuditLog
      summary: Export signed audit log
      description: >
        Exports the request audit log as Ed25519-signed JSON Lines. The export includes
        all requests within the specified time range. The signature can be verified with
        the project's public key using the Zevaro CLI.
        API keys, prompt content, and response content are never included in audit exports.
      tags:
        - Management
      security:
        - LocalBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: "Audit export parameters."
              properties:
                from:
                  type: ["string", "null"]
                  format: date-time
                  description: "Export records from this timestamp. Null exports all records."
                to:
                  type: ["string", "null"]
                  format: date-time
                  description: "Export records up to this timestamp. Null exports through now."
      responses:
        '200':
          description: "Signed audit log export in JSON Lines format."
          content:
            application/x-ndjson:
              schema:
                type: string
                description: "Newline-delimited JSON where each line is a signed audit log record."
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Sharing ────────────────────────────────────────────────────────────────────

  /api/v1/sharing/export:
    post:
      operationId: exportConfiguration
      summary: Export configuration bundle
      description: >
        Exports a portable configuration bundle containing routes, policies, and projects.
        API keys are never included. The bundle can be shared via file or git URL
        and imported by any Zevaro instance.
      tags:
        - Management
      security:
        - LocalBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: "Export scope selection."
              properties:
                include_routes:
                  type: boolean
                  description: "Whether to include routing rules. Defaults to true."
                include_policies:
                  type: boolean
                  description: "Whether to include user-defined policy bundles. Defaults to true."
                include_projects:
                  type: boolean
                  description: "Whether to include project configurations. Defaults to true."
      responses:
        '200':
          description: "Configuration bundle as a JSON file download."
          content:
            application/json:
              schema:
                type: object
                description: "Portable Zevaro configuration bundle."
                required:
                  - version
                  - exported_at
                properties:
                  version:
                    type: string
                    description: "Bundle format version."
                  exported_at:
                    type: string
                    format: date-time
                    description: "ISO 8601 timestamp of the export."
                  routes:
                    type: ["array", "null"]
                    description: "Exported routing rules."
                    items:
                      $ref: '#/components/schemas/Route'
                  policies:
                    type: ["array", "null"]
                    description: "Exported user-defined policy bundles."
                    items:
                      $ref: '#/components/schemas/Policy'
                  projects:
                    type: ["array", "null"]
                    description: "Exported project configurations."
                    items:
                      $ref: '#/components/schemas/Project'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/sharing/import:
    post:
      operationId: importConfiguration
      summary: Import a configuration bundle
      description: >
        Imports a configuration bundle produced by /api/v1/sharing/export. Validates
        the bundle format before applying. Conflicts (duplicate names) are reported and
        can be resolved via a `merge_strategy` parameter.
      tags:
        - Management
      security:
        - LocalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "Import request."
              required:
                - bundle
              properties:
                bundle:
                  type: object
                  description: "The configuration bundle to import (produced by /api/v1/sharing/export)."
                  additionalProperties: true
                merge_strategy:
                  type: string
                  enum: ["skip_existing", "overwrite_existing"]
                  description: "How to handle conflicts with existing configurations. Defaults to 'skip_existing'."
      responses:
        '200':
          description: "Import result summary."
          content:
            application/json:
              schema:
                type: object
                description: "Import summary."
                required:
                  - imported
                  - skipped
                  - errors
                properties:
                  imported:
                    type: integer
                    description: "Number of items successfully imported."
                  skipped:
                    type: integer
                    description: "Number of items skipped due to conflicts."
                  errors:
                    type: array
                    description: "List of import errors."
                    items:
                      type: string
        '400':
          description: "Bad request — invalid or malformed bundle."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Discovery ──────────────────────────────────────────────────────────────────

  /api/v1/discovery/local-models:
    get:
      operationId: discoverLocalModels
      summary: Discover local model servers
      description: >
        Triggers an immediate scan for local model servers on their well-known ports
        (Ollama :11434, LM Studio :1234, llama.cpp :8080, vLLM :8000) and returns
        the discovery results. Note: the daemon also runs this scan automatically every
        30 seconds in the background.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "Local model discovery results."
          content:
            application/json:
              schema:
                type: object
                description: "Discovery results."
                required:
                  - discovered
                properties:
                  discovered:
                    type: array
                    description: "Discovered local model servers."
                    items:
                      type: object
                      description: "A discovered local model server."
                      required:
                        - server_type
                        - port
                        - reachable
                      properties:
                        server_type:
                          type: string
                          enum: ["ollama", "lmstudio", "llamacpp", "vllm"]
                          description: "Detected server type."
                        port:
                          type: integer
                          description: "Port on which the server was detected."
                        reachable:
                          type: boolean
                          description: "Whether the server responded to the detection probe."
                        models:
                          type: ["array", "null"]
                          description: "Models discovered from this server. Null if the server was unreachable."
                          items:
                            type: string
                        already_registered:
                          type: boolean
                          description: "Whether this server is already registered as a Zevaro provider."
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Health ─────────────────────────────────────────────────────────────────────

  /api/v1/health/keys:
    get:
      operationId: listKeyHealth
      summary: List API key health
      description: >
        Returns health statistics for all registered API keys across all providers.
        Keys are never returned in plaintext — only obfuscated aliases and health
        metadata are exposed.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "Key health statistics."
          content:
            application/json:
              schema:
                type: object
                description: "Key health list response."
                required:
                  - keys
                properties:
                  keys:
                    type: array
                    description: "Array of key health objects."
                    items:
                      $ref: '#/components/schemas/KeyHealth'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Plugins ────────────────────────────────────────────────────────────────────

  /api/v1/plugins:
    get:
      operationId: listPlugins
      summary: List installed plugins
      description: "Returns all installed Zevaro plugins and their status."
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "List of installed plugins."
          content:
            application/json:
              schema:
                type: object
                description: "Plugins list response."
                required:
                  - plugins
                properties:
                  plugins:
                    type: array
                    description: "Array of plugin objects."
                    items:
                      $ref: '#/components/schemas/Plugin'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/plugins/install:
    post:
      operationId: installPlugin
      summary: Install a plugin
      description: >
        Installs a Zevaro plugin from a binary path or URL. The plugin manifest is validated,
        capability declarations are recorded, and the plugin is sandboxed via HashiCorp
        go-plugin subprocess RPC.
      tags:
        - Management
      security:
        - LocalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "Plugin installation request."
              required:
                - source
              properties:
                source:
                  type: string
                  description: "Source of the plugin binary: an absolute filesystem path or a download URL."
                enabled:
                  type: boolean
                  description: "Whether to enable the plugin immediately after installation. Defaults to true."
      responses:
        '201':
          description: "Plugin installed."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plugin'
        '400':
          description: "Bad request — invalid source or manifest validation failure."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/plugins/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Plugin UUID."
        schema:
          type: string
          format: uuid
    delete:
      operationId: uninstallPlugin
      summary: Uninstall a plugin
      description: >
        Uninstalls a plugin. The plugin process is terminated, its binary is not deleted
        (the user manages plugin binaries themselves), and its registration is removed
        from the database.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '204':
          description: "Plugin uninstalled."
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: "Plugin not found."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Updater ────────────────────────────────────────────────────────────────────

  /api/v1/updater/status:
    get:
      operationId: getUpdaterStatus
      summary: Get auto-update status
      description: >
        Returns the current state of the auto-update mechanism, including the current
        version, the selected update channel, whether an update is available, and
        download progress if an update is being downloaded.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "Updater status."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdaterStatus'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/updater/check:
    post:
      operationId: checkForUpdate
      summary: Trigger an update check
      description: >
        Triggers an immediate check of the update manifest, bypassing the hourly
        automatic schedule. Returns the updater status after the check completes.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "Updater status after the check."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdaterStatus'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
