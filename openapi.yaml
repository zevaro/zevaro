        in: path
        required: true
        description: "Provider registration UUID."
        schema:
          type: string
          format: uuid
    post:
      operationId: testProvider
      summary: Test provider connectivity
      description: >
        Sends a minimal liveness request to the provider and returns the health result.
        Updates the provider's health_status in the database. Does not charge the user
        (uses the cheapest available model with a single-token prompt).
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "Health check completed (result may be healthy or unhealthy)."
          content:
            application/json:
              schema:
                type: object
                description: "Provider health test result."
                required:
                  - status
                  - latency_ms
                properties:
                  status:
                    type: string
                    enum: ["healthy", "degraded", "unhealthy"]
                    description: "Observed health status."
                  latency_ms:
                    type: ["integer", "null"]
                    description: "Round-trip latency in milliseconds. Null if the request failed before completion."
                  error:
                    type: ["string", "null"]
                    description: "Error message if the test failed."
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
