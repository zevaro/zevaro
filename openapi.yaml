  /api/v1/cache:
    delete:
      operationId: purgeCache
      summary: Purge the semantic cache
      description: >
        Clears all entries from the semantic prompt cache. This is a destructive operation
        and cannot be undone. Future requests will be dispatched to providers until the cache
        is rebuilt.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '204':
          description: "Cache purged successfully."
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Compare ────────────────────────────────────────────────────────────────────

  /api/v1/compare:
    post:
      operationId: compareModels
      summary: Multi-model comparison
      description: >
        Dispatches a single prompt to multiple providers/models in parallel and returns
        all responses for side-by-side comparison. Results are stored in history with a
        comparison tag. Useful for evaluating model quality and cost differences.
      tags:
        - Management
      security:
        - LocalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "Multi-model comparison request."
              required:
                - prompt
                - targets
              properties:
                prompt:
                  type: string
                  description: "The prompt to send to all target models."
                targets:
                  type: array
                  description: "List of provider/model targets to dispatch to."
                  minItems: 2
                  items:
                    type: object
                    description: "A single comparison target."
                    required:
                      - provider_id
                      - model_id
                    properties:
                      provider_id:
                        type: string
                        format: uuid
                        description: "Provider registration UUID."
                      model_id:
                        type: string
                        description: "Model identifier string."
                timeout_ms:
                  type: ["integer", "null"]
                  description: "Per-target timeout in milliseconds. Defaults to 30000."
                system:
                  type: ["string", "null"]
                  description: "Optional system prompt to include with all requests."
      responses:
        '200':
          description: "Comparison results."
          content:
            application/json:
              schema:
                type: object
                description: "Multi-model comparison response."
                required:
                  - comparison_id
                  - results
                properties:
                  comparison_id:
                    type: string
                    format: uuid
                    description: "Unique identifier for this comparison run."
                  results:
                    type: array
                    description: "Per-target results."
                    items:
                      type: object
                      description: "Result from a single comparison target."
                      required:
                        - provider_id
                        - model_id
                        - success
                      properties:
                        provider_id:
                          type: string
                          format: uuid
                          description: "Provider registration UUID."
                        model_id:
                          type: string
                          description: "Model identifier string."
                        success:
                          type: boolean
                          description: "Whether this target returned a successful response."
                        response:
                          type: ["string", "null"]
                          description: "The generated response text. Null if the request failed."
                        latency_ms:
                          type: ["integer", "null"]
                          description: "Response latency in milliseconds."
                        cost_usd:
                          type: ["number", "null"]
                          format: double
                          description: "Cost in USD for this response."
                        input_tokens:
                          type: ["integer", "null"]
                          description: "Input token count."
                        output_tokens:
                          type: ["integer", "null"]
                          description: "Output token count."
                        error:
                          type: ["string", "null"]
                          description: "Error message if the request failed."
        '400':
          description: "Bad request."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

