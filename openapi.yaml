  # ── History ────────────────────────────────────────────────────────────────────

  /api/v1/history:
    get:
      operationId: listHistory
      summary: List prompt history
      description: >
        Returns paginated prompt history with full-text search and filter support.
        FTS queries use SQLite FTS5 syntax (AND, OR, NOT, phrase, prefix^).
      tags:
        - Management
      security:
        - LocalBearer: []
      parameters:
        - name: q
          in: query
          required: false
          description: "Full-text search query (FTS5 syntax). Searches prompt content."
          schema:
            type: string
        - name: model
          in: query
          required: false
          description: "Filter by model identifier string."
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: "Filter requests created at or after this ISO 8601 timestamp."
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: "Filter requests created at or before this ISO 8601 timestamp."
          schema:
            type: string
            format: date-time
        - name: project_id
          in: query
          required: false
          description: "Filter by project UUID."
          schema:
            type: string
            format: uuid
        - name: cost_min
          in: query
          required: false
          description: "Filter requests with cost_usd >= this value."
          schema:
            type: number
        - name: cost_max
          in: query
          required: false
          description: "Filter requests with cost_usd <= this value."
          schema:
            type: number
        - name: outcome
          in: query
          required: false
          description: "Filter by request outcome."
          schema:
            type: string
            enum: ["success", "error", "rate_limited", "cancelled", "cache_hit"]
        - name: tag
          in: query
          required: false
          description: "Filter by session tag (exact match)."
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: "Maximum number of results to return. Defaults to 50, max 200."
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: "Number of results to skip for pagination."
          schema:
            type: integer
      responses:
        '200':
          description: "Paginated history results."
          content:
            application/json:
              schema:
                type: object
                description: "History list response."
                required:
                  - entries
                  - total
                properties:
                  entries:
                    type: array
                    description: "Array of history entry objects."
                    items:
                      $ref: '#/components/schemas/HistoryEntry'
                  total:
                    type: integer
                    description: "Total number of records matching the filter (before limit/offset)."
        '400':
          description: "Bad request — invalid query parameters."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/history/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "History entry UUID."
        schema:
          type: string
          format: uuid
    get:
      operationId: getHistoryEntry
      summary: Get a history entry
      description: "Returns a single history entry by UUID."
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "The requested history entry."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryEntry'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: "History entry not found."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Spend ──────────────────────────────────────────────────────────────────────

  /api/v1/spend:
    get:
      operationId: getSpendAggregates
      summary: Get spend aggregates
      description: >
        Returns aggregated spend data grouped by the specified dimension over the
        specified time window. All dimensions (provider, model, project, session, tag)
        are supported. Time windows: day, week, month, all-time.
      tags:
        - Management
      security:
        - LocalBearer: []
      parameters:
        - name: group_by
          in: query
          required: false
          description: "Grouping dimension for the aggregation. Defaults to 'provider'."
          schema:
            type: string
            enum: ["provider", "model", "project", "session", "tag"]
        - name: window
          in: query
          required: false
          description: "Time window for the aggregation. Defaults to 'month'."
          schema:
            type: string
            enum: ["day", "week", "month", "all"]
        - name: from
          in: query
          required: false
          description: "Start of the aggregation window (ISO 8601). Overrides the window parameter."
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: "End of the aggregation window (ISO 8601). Overrides the window parameter."
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: "Spend aggregation response."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpendAggregate'
        '400':
          description: "Bad request — invalid query parameters."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/spend/projection:
    get:
      operationId: getSpendProjection
      summary: Get spend projection
      description: >
        Returns the current 30-day spend projection based on a 14-day rolling window
        with linear regression, including a 90% confidence interval. Updated after every request.
      tags:
        - Management
      security:
        - LocalBearer: []
      responses:
        '200':
          description: "Spend projection response."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpendProjection'
        '401':
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

